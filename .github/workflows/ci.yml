name: CI - Build, Test, and Docker Image

on:
  pull_request:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - video-processing-platform/frontend/**
      - video-processing-platform/charts/**
      - .github/workflows/ci.yml
  push:
    branches: [main]
    paths:
      - video-processing-platform/backend/**
      - video-processing-platform/frontend/**
      - video-processing-platform/charts/**
      - .github/workflows/ci.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-image-metadata:
    name: Prepare Image Metadata
    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.meta.outputs.chart_version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      ci_image_tag: ${{ steps.meta.outputs.ci_image_tag }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          CHART_VERSION=$(grep '^version:' video-processing-platform/charts/video-processing-platform/Chart.yaml | awk '{print $2}')
          SHORT_SHA="${GITHUB_SHA::7}"
          CI_IMAGE_TAG="${CHART_VERSION}-build.${GITHUB_RUN_NUMBER}-sha.${SHORT_SHA}"
          IMAGE_NAMESPACE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}"

          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "ci_image_tag=$CI_IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_namespace=$IMAGE_NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "backend_image=${IMAGE_NAMESPACE}/video-backend:${CI_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${IMAGE_NAMESPACE}/video-frontend:${CI_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  backend-build:
    name: Backend - Build Stage
    needs: prepare-image-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (compile sanity check)
        run: python -m compileall .

  backend-test:
    name: Backend - Test Stage
    needs: backend-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: video-processing-platform/backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: video-processing-platform/backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Install ffmpeg (for metadata-related tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Lint
        run: flake8 . --select=F

      - name: Run tests
        run: python -m pytest tests -v

  backend-image:
    name: Backend - Docker Image Stage
    needs:
      - prepare-image-metadata
      - backend-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (retry)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt/5: docker login ghcr.io"
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              echo "GHCR login successful."
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "GHCR login failed after retries."
          exit 1

      - name: Build backend Docker image
        id: build_backend_image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/backend
          file: ./video-processing-platform/backend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
          tags: |
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.short_sha }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:latest

      - name: Publish backend image summary
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          {
            echo "### Backend Image Push"
            echo "- Registry: ghcr.io"
            echo "- Image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}"
            echo "- Digest: ${{ steps.build_backend_image.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify backend image push
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: docker buildx imagetools inspect ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}

  frontend-build:
    name: Frontend - Build Stage
    needs: prepare-image-metadata
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video-processing-platform/frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Configure Clerk fallback for CI build
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

  frontend-test:
    name: Frontend - Test/Check Stage
    needs: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: video-processing-platform/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: video-processing-platform/frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run quality checks (lint)
        run: npm run lint

  frontend-image:
    name: Frontend - Docker Image Stage
    needs:
      - prepare-image-metadata
      - frontend-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry (retry)
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        shell: bash
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt/5: docker login ghcr.io"
            if echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin; then
              echo "GHCR login successful."
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "GHCR login failed after retries."
          exit 1

      - name: Resolve Clerk build arg fallback
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" ]; then
            echo "CLERK_BUILD_KEY=pk_test_local" >> "$GITHUB_ENV"
          else
            echo "CLERK_BUILD_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi

      - name: Build frontend Docker image
        id: build_frontend_image
        uses: docker/build-push-action@v6
        with:
          context: ./video-processing-platform/frontend
          file: ./video-processing-platform/frontend/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
          build-args: |
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ env.CLERK_BUILD_KEY }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
          tags: |
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.short_sha }}
            ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:latest

      - name: Publish frontend image summary
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: |
          {
            echo "### Frontend Image Push"
            echo "- Registry: ghcr.io"
            echo "- Image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}"
            echo "- Digest: ${{ steps.build_frontend_image.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify frontend image push
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
        run: docker buildx imagetools inspect ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}

  check-deploy-runner:
    name: Deploy - Runner Availability Check
    runs-on: ubuntu-latest
    needs:
      - prepare-image-metadata
      - backend-image
      - frontend-image
      - detect-deploy-runner-mode
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' }}
    outputs:
      deploy_runner_ready: ${{ steps.probe.outputs.deploy_runner_ready }}
      deploy_runs_on: ${{ steps.probe.outputs.deploy_runs_on }}
    steps:
      - name: Probe selected runner type
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          USE_SELF_HOSTED: ${{ vars.USE_SELF_HOSTED }}
          FORCE_SELF_HOSTED: ${{ needs.detect-deploy-runner-mode.outputs.force_self_hosted }}
        run: |
          if [ "$USE_SELF_HOSTED" != "true" ] && [ "$FORCE_SELF_HOSTED" != "true" ]; then
            echo "deploy_runs_on=ubuntu-latest" >> "$GITHUB_OUTPUT"
            echo "deploy_runner_ready=true" >> "$GITHUB_OUTPUT"
            echo "Using GitHub-hosted runner for deploy."
            exit 0
          fi

          echo "deploy_runs_on=self-hosted" >> "$GITHUB_OUTPUT"

          STATUS_CODE=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -o runners.json \
            -w "%{http_code}" \
            "https://api.github.com/repos/$REPO/actions/runners")

          if [ "$STATUS_CODE" != "200" ]; then
            echo "Warning: Could not query runner API (HTTP $STATUS_CODE)."
            echo "Proceeding with self-hosted deploy and letting scheduler validate runner availability."
            echo "deploy_runner_ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ONLINE_SELF_HOSTED=$(jq '[.runners[] | select(.status == "online") ] | length' runners.json)

          if [ "$ONLINE_SELF_HOSTED" -gt 0 ]; then
            echo "deploy_runner_ready=true" >> "$GITHUB_OUTPUT"
            echo "Found $ONLINE_SELF_HOSTED online self-hosted runner(s)."
          else
            echo "deploy_runner_ready=false" >> "$GITHUB_OUTPUT"
            echo "No online self-hosted runners found."
          fi

  detect-deploy-runner-mode:
    name: Deploy - Detect Runner Mode
    runs-on: ubuntu-latest
    needs:
      - prepare-image-metadata
      - backend-image
      - frontend-image
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' }}
    outputs:
      force_self_hosted: ${{ steps.detect.outputs.force_self_hosted }}
      kube_server: ${{ steps.detect.outputs.kube_server }}
    steps:
      - name: Detect kube API endpoint type
        id: detect
        env:
          KCFG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KCFG" ]; then
            echo "force_self_hosted=false" >> "$GITHUB_OUTPUT"
            echo "kube_server=unknown" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG is not set; runner mode not forced."
            exit 0
          fi

          TMP_CFG="$(mktemp)"
          if echo "$KCFG" | base64 -d > "$TMP_CFG" 2>/dev/null; then
            :
          else
            printf '%s' "$KCFG" > "$TMP_CFG"
          fi

          SERVER="$(awk '/server:/{print $2; exit}' "$TMP_CFG")"
          if [ -z "$SERVER" ]; then
            SERVER="unknown"
          fi

          echo "kube_server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "Detected kube server endpoint: $SERVER"

          if echo "$SERVER" | grep -Eq 'kubernetes\.docker\.internal|localhost|127\.0\.0\.1'; then
            echo "force_self_hosted=true" >> "$GITHUB_OUTPUT"
            echo "Local-only endpoint detected; deployment will target self-hosted runner."
          else
            echo "force_self_hosted=false" >> "$GITHUB_OUTPUT"
            echo "Remote endpoint detected; hosted runner can be used."
          fi

  deploy-runner-missing:
    name: Deploy - Missing Self-Hosted Runner
    runs-on: ubuntu-latest
    needs: check-deploy-runner
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' && needs.check-deploy-runner.outputs.deploy_runs_on == 'self-hosted' && needs.check-deploy-runner.outputs.deploy_runner_ready != 'true' }}
    steps:
      - name: Fail fast with remediation
        run: |
          echo "::error title=No self-hosted runner available::Deploy is configured with USE_SELF_HOSTED=true, but no online self-hosted runner is available for this repository. Start your self-hosted runner service, or set USE_SELF_HOSTED=false to use ubuntu-latest."
          exit 1

  deploy-k8s:
    name: Deploy - Helm Release
    needs:
      - prepare-image-metadata
      - backend-image
      - frontend-image
      - detect-deploy-runner-mode
      - check-deploy-runner

    if: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && vars.ENABLE_K8S_DEPLOY == 'true' && needs.check-deploy-runner.outputs.deploy_runner_ready == 'true' }}
    runs-on: ${{ needs.check-deploy-runner.outputs.deploy_runs_on }}

    timeout-minutes: 20
    env:
      HELM_RELEASE: video-platform
      K8S_NAMESPACE: default
    defaults:
      run:
          shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
          shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ver = "v1.32.0"
          $bin = "$env:USERPROFILE\tools\kubectl"
          New-Item -ItemType Directory -Path $bin -Force | Out-Null
          Invoke-WebRequest -Uri "https://dl.k8s.io/release/$ver/bin/windows/amd64/kubectl.exe" -OutFile "$bin\kubectl.exe" -UseBasicParsing
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Write-Host "kubectl $ver installed to $bin"

      - name: Set up Helm
          shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $ver = "v3.17.0"
          $tmp = "$env:TEMP\helm-install"
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          Invoke-WebRequest -Uri "https://get.helm.sh/helm-$ver-windows-amd64.zip" -OutFile "$tmp\helm.zip" -UseBasicParsing
          Expand-Archive -Path "$tmp\helm.zip" -DestinationPath $tmp -Force
          $bin = "$env:USERPROFILE\tools\helm"
          New-Item -ItemType Directory -Path $bin -Force | Out-Null
          Copy-Item "$tmp\windows-amd64\helm.exe" "$bin\helm.exe" -Force
          Add-Content -Path $env:GITHUB_PATH -Value $bin
          Write-Host "Helm $ver installed to $bin"

      - name: Resolve deployment environment
        run: |
          $deployEnv = "${{ vars.DEPLOY_ENV }}"
          if ([string]::IsNullOrWhiteSpace($deployEnv)) {
            $deployEnv = "dev"
          }

          $namespace = "${{ secrets.K8S_NAMESPACE }}"
          if ([string]::IsNullOrWhiteSpace($namespace)) {
            $namespace = "$env:K8S_NAMESPACE"
          }

          $valuesFile = "video-processing-platform/charts/video-processing-platform/values-$deployEnv.yaml"

          Add-Content -Path $env:GITHUB_ENV -Value "DEPLOY_ENV=$deployEnv"
          Add-Content -Path $env:GITHUB_ENV -Value "K8S_NAMESPACE=$namespace"
          Add-Content -Path $env:GITHUB_ENV -Value "VALUES_FILE=$valuesFile"

      - name: Configure kubeconfig securely
        run: |
          $kcfg = "${{ secrets.KUBE_CONFIG }}"
          if ([string]::IsNullOrWhiteSpace($kcfg)) {
            Write-Host "KUBE_CONFIG secret is required."
            exit 1
          }

          $kubeDir = Join-Path $HOME ".kube"
          New-Item -ItemType Directory -Path $kubeDir -Force | Out-Null
          $kubeConfigPath = Join-Path $kubeDir "config"

          try {
            $bytes = [System.Convert]::FromBase64String($kcfg)
            [System.IO.File]::WriteAllBytes($kubeConfigPath, $bytes)
            Write-Host "Using base64-encoded kubeconfig from secret"
          } catch {
            Set-Content -Path $kubeConfigPath -Value $kcfg -NoNewline
            Write-Host "Using raw kubeconfig from secret"
          }

      - name: Guard against local-only kubeconfig on hosted runners
        if: ${{ needs.check-deploy-runner.outputs.deploy_runs_on == 'ubuntu-latest' }}
        run: |
          $server = kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}'
          Write-Host "Detected kube API server endpoint: $server"

          if ($server -match 'kubernetes\.docker\.internal|localhost|127\.0\.0\.1') {
            Write-Host "::error title=Local-only kubeconfig endpoint detected::KUBE_CONFIG points to '$server', which is not reachable from GitHub-hosted runners. Use a self-hosted runner with Docker Desktop network access, or provide a remotely reachable Kubernetes API endpoint in KUBE_CONFIG."
            exit 1
          }

      - name: Validate cluster access and prerequisites
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.CLERK_SECRET_KEY }}") -or [string]::IsNullOrWhiteSpace("${{ secrets.MONGO_USERNAME }}") -or [string]::IsNullOrWhiteSpace("${{ secrets.MONGO_PASSWORD }}")) {
            Write-Host "CLERK_SECRET_KEY, MONGO_USERNAME, and MONGO_PASSWORD secrets are required."
            exit 1
          }

          if ([string]::IsNullOrWhiteSpace("${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}")) {
            Write-Host "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY secret is required."
            exit 1
          }

          if (-not (Test-Path "$env:VALUES_FILE")) {
            Write-Host "Values file not found: $env:VALUES_FILE"
            exit 1
          }

          kubectl cluster-info
          kubectl get ns "$env:K8S_NAMESPACE" *> $null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Namespace '$env:K8S_NAMESPACE' not found yet; continuing."
          }

      - name: Create or update runtime Kubernetes secrets
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace("$env:GHCR_TOKEN")) {
            $env:GHCR_TOKEN = "${{ github.token }}"
            Write-Host "GHCR_PAT not set; using GITHUB_TOKEN for ghcr-pull-secret."
          }

          kubectl create secret docker-registry ghcr-pull-secret --namespace "$env:K8S_NAMESPACE" --docker-server=ghcr.io --docker-username="$env:GHCR_USERNAME" --docker-password="$env:GHCR_TOKEN" --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic clerk-secrets --namespace "$env:K8S_NAMESPACE" --from-literal=publishable-key="$env:CLERK_PUBLISHABLE_KEY" --from-literal=secret-key="$env:CLERK_SECRET_KEY" --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic mongo-secrets --namespace "$env:K8S_NAMESPACE" --from-literal=username="$env:MONGO_USERNAME" --from-literal=password="$env:MONGO_PASSWORD" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy release with current CI image tags
        run: |
          helm upgrade --install "$env:HELM_RELEASE" video-processing-platform/charts/video-processing-platform `
            --namespace "$env:K8S_NAMESPACE" `
            --create-namespace `
            --atomic `
            --wait `
            -f video-processing-platform/charts/video-processing-platform/values.yaml `
            -f "$env:VALUES_FILE" `
            --set backend.image.repository=${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend `
            --set backend.image.tag=${{ needs.prepare-image-metadata.outputs.ci_image_tag }} `
            --set frontend.image.repository=${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend `
            --set frontend.image.tag=${{ needs.prepare-image-metadata.outputs.ci_image_tag }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/$env:HELM_RELEASE-video-processing-platform-backend -n "$env:K8S_NAMESPACE" --timeout=240s
          kubectl rollout status deployment/$env:HELM_RELEASE-video-processing-platform-frontend -n "$env:K8S_NAMESPACE" --timeout=240s

      - name: Publish deployment summary
        run: |
          @"
          ## CI/CD Deployment Summary
          - Environment: $env:DEPLOY_ENV
          - Namespace: $env:K8S_NAMESPACE
          - Helm release: $env:HELM_RELEASE
          - Backend image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-backend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
          - Frontend image: ${{ needs.prepare-image-metadata.outputs.image_namespace }}/video-frontend:${{ needs.prepare-image-metadata.outputs.ci_image_tag }}
          - Commit: ${{ github.sha }}
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
