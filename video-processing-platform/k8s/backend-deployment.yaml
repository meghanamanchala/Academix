apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: video-backend
spec:
  replicas: 3
  minReadySeconds: 5
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 60
  selector:
    matchLabels:
      app: video-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: video-backend
    spec:
      containers:
        - name: backend
          image: video-processing-platform-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: password
            - name: MONGO_URL
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongo-service:27017"
            - name: MONGO_DB_NAME
              value: "video_platform"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: MAX_UPLOAD_BYTES
              value: "1073741824"

          volumeMounts:
            - name: uploads
              mountPath: /app/uploads

          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 1
            successThreshold: 1

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads-pvc