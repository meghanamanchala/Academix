apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "video-processing-platform.fullname" . }}-mongo-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mongodb.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "video-processing-platform.fullname" . }}-mongo
  labels:
    app: {{ include "video-processing-platform.name" . }}-mongo
spec:
  replicas: {{ .Values.mongodb.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "video-processing-platform.name" . }}-mongo
  template:
    metadata:
      labels:
        app: {{ include "video-processing-platform.name" . }}-mongo
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secrets
                  key: password
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: {{ include "video-processing-platform.fullname" . }}-mongo-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "video-processing-platform.fullname" . }}-mongo-service
spec:
  selector:
    app: {{ include "video-processing-platform.name" . }}-mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
