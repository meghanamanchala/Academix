services:
  - type: web
    name: video-processing-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false
      - key: MONGO_DB_NAME
        value: video-platform
      - key: GOOGLE_API_KEY
        sync: false
      - key: ENABLE_AI_SUMMARY
        value: "true"
      - key: ENABLE_LIVE_SUMMARY
        value: "true"
      - key: MEDIA_STORAGE_DRIVER
        value: s3
      - key: MEDIA_S3_BUCKET
        sync: false
      - key: MEDIA_S3_REGION
        value: us-east-1
      - key: MEDIA_S3_ACCESS_KEY_ID
        sync: false
      - key: MEDIA_S3_SECRET_ACCESS_KEY
        sync: false